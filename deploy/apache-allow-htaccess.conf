# Install (Ubuntu/Debian):
#   sudo cp deploy/apache-allow-htaccess.conf /etc/apache2/conf-available/cp-promptx.conf
#   sudo a2enconf cp-promptx
#   sudo systemctl reload apache2
#
# Without this, AllowOverride None on /var/www/ means .htaccess is IGNORED and
# /public/dashboard will 404 because Apache looks for a real "dashboard" file.

<Directory /var/www/html/hackathon/cp-promptx/public>
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>
